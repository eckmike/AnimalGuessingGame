<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Guess the Animal</title>
<style>
  :root {
    --bg: #f4f1ea;
    --card: #ffffff;
    --ink: #2b2620;
    --muted: #766f63;
    --accent: #d97a3f;
    --accent-ink: #ffffff;
    --border: #e4ddcf;
    --good: #4c8b5e;
    --bad: #c0503f;
    --shadow: 0 6px 18px rgba(43, 38, 32, 0.08);
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #201d19;
      --card: #2c2822;
      --ink: #f2ece1;
      --muted: #b3a996;
      --accent: #e79358;
      --accent-ink: #201d19;
      --border: #3d372e;
      --good: #7dbf8e;
      --bad: #e08373;
      --shadow: 0 6px 18px rgba(0, 0, 0, 0.35);
    }
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: var(--bg);
    color: var(--ink);
    min-height: 100vh;
    padding: 24px 16px 60px;
  }
  .wrap {
    max-width: 720px;
    margin: 0 auto;
  }
  header {
    text-align: center;
    margin-bottom: 20px;
  }
  header h1 {
    margin: 0 0 4px;
    font-size: 2rem;
  }
  header p {
    margin: 0;
    color: var(--muted);
  }
  .topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    margin-bottom: 20px;
    flex-wrap: wrap;
  }
  .badge {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 999px;
    padding: 8px 16px;
    font-weight: 600;
    box-shadow: var(--shadow);
  }
  button {
    font-family: inherit;
    cursor: pointer;
  }
  .btn-new {
    background: var(--accent);
    color: var(--accent-ink);
    border: none;
    border-radius: 999px;
    padding: 10px 20px;
    font-weight: 700;
    font-size: 0.95rem;
    box-shadow: var(--shadow);
  }
  .btn-new:active { transform: translateY(1px); }

  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 18px;
    box-shadow: var(--shadow);
    margin-bottom: 18px;
  }
  .card h2 {
    margin: 0 0 12px;
    font-size: 1.05rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }

  .questions-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 10px;
  }
  @media (max-width: 480px) {
    .questions-grid { grid-template-columns: 1fr; }
  }
  .q-btn {
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--ink);
    border-radius: 10px;
    padding: 12px 14px;
    font-size: 0.95rem;
    text-align: left;
    transition: background 0.15s, transform 0.1s;
  }
  .q-btn:hover:not(:disabled) {
    background: var(--accent);
    color: var(--accent-ink);
  }
  .q-btn:disabled {
    opacity: 0.4;
    cursor: default;
  }
  .q-btn.asked {
    opacity: 0.55;
    border-color: var(--accent);
  }

  .log {
    display: flex;
    flex-direction: column;
    gap: 10px;
    max-height: 260px;
    overflow-y: auto;
  }
  .log-empty {
    color: var(--muted);
    font-style: italic;
  }
  .log-item {
    border-left: 3px solid var(--accent);
    padding: 4px 12px;
  }
  .log-item .q {
    font-weight: 600;
    font-size: 0.9rem;
  }
  .log-item .a {
    color: var(--muted);
    font-size: 0.9rem;
  }

  .guess-form {
    display: flex;
    gap: 10px;
  }
  .guess-form input {
    flex: 1;
    padding: 12px 14px;
    border-radius: 10px;
    border: 1px solid var(--border);
    background: var(--bg);
    color: var(--ink);
    font-size: 1rem;
  }
  .guess-form input:focus {
    outline: 2px solid var(--accent);
  }
  .guess-form button {
    background: var(--accent);
    color: var(--accent-ink);
    border: none;
    border-radius: 10px;
    padding: 0 20px;
    font-weight: 700;
  }
  .guess-form.final button {
    background: var(--bad);
  }
  .guess-form input:disabled,
  .guess-form button:disabled {
    opacity: 0.5;
    cursor: not-allowed;
  }

  .feedback {
    margin-top: 12px;
    font-weight: 600;
    min-height: 1.4em;
  }
  .feedback.good { color: var(--good); }
  .feedback.bad { color: var(--bad); }

  .result {
    text-align: center;
  }
  .result .emoji {
    font-size: 4rem;
    line-height: 1;
    margin-bottom: 8px;
  }
  .result h2 {
    text-transform: none;
    letter-spacing: normal;
    font-size: 1.5rem;
    color: var(--ink);
    margin-bottom: 4px;
  }
  .stars {
    font-size: 1.4rem;
    letter-spacing: 4px;
    margin: 8px 0;
    color: var(--accent);
  }
  .hidden { display: none !important; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>🐾 Guess the Animal</h1>
    <p>Ask up to <span id="maxQLabel">5</span> questions, then make your final guess.</p>
  </header>

  <div class="topbar">
    <div class="badge" id="remainingBadge">5 questions left</div>
    <button class="btn-new" id="newGameBtn">New Game</button>
  </div>

  <div class="card">
    <h2>Ask a question</h2>
    <div class="questions-grid" id="questionsGrid"></div>
  </div>

  <div class="card">
    <h2>Clues so far</h2>
    <div class="log" id="log">
      <div class="log-empty">No questions asked yet — pick one above to get your first clue.</div>
    </div>
  </div>

  <div class="card" id="guessCard">
    <h2 id="guessHeading">Make a guess</h2>
    <form class="guess-form" id="guessForm">
      <input type="text" id="guessInput" placeholder="Type an animal name…" autocomplete="off" />
      <button type="submit">Guess</button>
    </form>
    <div class="feedback" id="feedback"></div>
  </div>

  <div class="card result hidden" id="resultCard">
    <div class="emoji" id="resultEmoji"></div>
    <h2 id="resultTitle"></h2>
    <div id="resultDetail"></div>
    <div class="stars" id="resultStars"></div>
    <button class="btn-new" id="playAgainBtn">Play Again</button>
  </div>
</div>

      eat: 'Plants and scraps of other insects.',

      eat: 'Almost anything, including scraps and decaying matter.',

      funfact: 'Can survive for weeks without its head before it eventually dies of thirst.' },

      eat: 'Insects and small animals, caught with its pincers.',
      sound: 'Silent.',
      habitat: 'Deserts and warm regions worldwide.',
      legs: '8 legs, plus pincers and a curved tail.',
      size: 'Small.',
      covering: 'A hard exoskeleton.',
      movement: 'Scurries low to the ground and strikes quickly with its tail.',
      funfact: 'Glows under ultraviolet light.' },
  ];

  // --- state ---
  let secret = null;
  let askedCount = 0;
  let askedKeys = new Set();
  let guessesMade = 0;
  let gameOver = false;

  // --- elements ---
  const questionsGrid = document.getElementById('questionsGrid');
  const remainingBadge = document.getElementById('remainingBadge');
  const log = document.getElementById('log');
  const guessForm = document.getElementById('guessForm');
  const guessInput = document.getElementById('guessInput');
  const guessHeading = document.getElementById('guessHeading');
  const feedback = document.getElementById('feedback');
  const guessCard = document.getElementById('guessCard');
  const resultCard = document.getElementById('resultCard');
  const resultEmoji = document.getElementById('resultEmoji');
  const resultTitle = document.getElementById('resultTitle');
  const resultDetail = document.getElementById('resultDetail');
  const resultStars = document.getElementById('resultStars');
  const newGameBtn = document.getElementById('newGameBtn');
  const playAgainBtn = document.getElementById('playAgainBtn');

  function levenshtein(a, b) {
    const m = a.length, n = b.length;
    const dp = Array.from({ length: m + 1 }, () => new Array(n + 1).fill(0));
    for (let i = 0; i <= m; i++) dp[i][0] = i;
    for (let j = 0; j <= n; j++) dp[0][j] = j;
    for (let i = 1; i <= m; i++) {
      for (let j = 1; j <= n; j++) {
        const cost = a[i - 1] === b[j - 1] ? 0 : 1;
        dp[i][j] = Math.min(
          dp[i - 1][j] + 1,
          dp[i][j - 1] + 1,
          dp[i - 1][j - 1] + cost
        );
      }
    }
    return dp[m][n];
  }

  function normalize(s) {
    return s.toLowerCase().trim().replace(/[^a-z]/g, '');
  }

  function isCorrectGuess(guess, name) {
    const g = normalize(guess);
    const n = normalize(name);
    if (!g) return false;
    if (g === n) return true;
    if (g.endsWith('s') && g.slice(0, -1) === n) return true;
    const threshold = n.length <= 4 ? 1 : n.length <= 7 ? 2 : 3;
    return levenshtein(g, n) <= threshold;
  }

  function renderQuestions() {
    questionsGrid.innerHTML = '';
    QUESTIONS.forEach(q => {
      const btn = document.createElement('button');
      btn.className = 'q-btn';
      btn.textContent = q.label;
      const asked = askedKeys.has(q.key);
      btn.disabled = asked || gameOver || askedCount >= MAX_QUESTIONS;
      if (asked) btn.classList.add('asked');
      btn.addEventListener('click', () => askQuestion(q));
      questionsGrid.appendChild(btn);
    });
  }

  function renderLog() {
    if (askedKeys.size === 0) {
      log.innerHTML = '<div class="log-empty">No questions asked yet — pick one above to get your first clue.</div>';
      return;
    }
    log.innerHTML = '';
    QUESTIONS.filter(q => askedKeys.has(q.key)).forEach(q => {
      const item = document.createElement('div');
      item.className = 'log-item';
      item.innerHTML = `<div class="q">${q.label}</div><div class="a">${secret[q.key]}</div>`;
      log.appendChild(item);
    });
  }

  function updateBadge() {
    const left = MAX_QUESTIONS - askedCount;
    remainingBadge.textContent = left > 0
      ? `${left} question${left === 1 ? '' : 's'} left`
      : 'No questions left';
  }

  function guessesAvailable() {
    return askedCount - guessesMade;
  }

  function updateGuessMode() {
    if (gameOver) return;
    const available = guessesAvailable();
    const locked = available <= 0;
    const isFinal = !locked && askedCount >= MAX_QUESTIONS && available === 1;

    guessInput.disabled = locked;
    guessForm.querySelector('button').disabled = locked;
    guessForm.classList.toggle('final', isFinal);

    if (locked) {
      guessHeading.textContent = askedCount === 0
        ? 'Ask a question to unlock your first guess'
        : 'Ask another question to guess again';
      guessInput.placeholder = 'Ask a question first…';
    } else {
      guessHeading.textContent = isFinal ? 'Final guess!' : 'Make a guess';
      guessInput.placeholder = 'Type an animal name…';
    }
    guessForm.querySelector('button').textContent = isFinal ? 'Final Guess' : 'Guess';
  }

  function askQuestion(q) {
    if (gameOver || askedKeys.has(q.key) || askedCount >= MAX_QUESTIONS) return;
    askedKeys.add(q.key);
    askedCount++;
    feedback.textContent = '';
    feedback.className = 'feedback';
    renderQuestions();
    renderLog();
    updateBadge();
    updateGuessMode();
  }

  function starsFor(n) {
    const total = MAX_QUESTIONS + 1;
    const earned = Math.max(1, total - n);
    return '★'.repeat(earned) + '☆'.repeat(total - earned);
  }

  function endGame(won) {
    gameOver = true;
    renderQuestions();
    guessCard.classList.add('hidden');
    resultCard.classList.remove('hidden');
    resultEmoji.textContent = secret.emoji;
    if (won) {
      resultTitle.textContent = `You got it! It was the ${secret.name}.`;
      resultDetail.textContent = `Solved in ${askedCount} question${askedCount === 1 ? '' : 's'}.`;
      resultStars.textContent = starsFor(askedCount);
    } else {
      resultTitle.textContent = `Out of guesses! It was the ${secret.name}.`;
      resultDetail.textContent = 'Better luck next time.';
      resultStars.textContent = '';
    }
  }

  guessForm.addEventListener('submit', (e) => {
    e.preventDefault();
    if (gameOver || guessesAvailable() <= 0) return;
    const guess = guessInput.value;
    if (!guess.trim()) return;

    guessesMade++;
    const noGuessesLeft = askedCount >= MAX_QUESTIONS && guessesAvailable() <= 0;
    const correct = isCorrectGuess(guess, secret.name);

    if (correct) {
      endGame(true);
      return;
    }

    if (noGuessesLeft) {
      endGame(false);
      return;
    }

    feedback.textContent = `Not quite — "${guess.trim()}" isn't it. Ask another question or guess again.`;
    feedback.className = 'feedback bad';
    guessInput.value = '';
    updateGuessMode();
    guessInput.focus();
  });

  function newGame() {
    secret = ANIMALS[Math.floor(Math.random() * ANIMALS.length)];
    askedCount = 0;
    askedKeys = new Set();
    guessesMade = 0;
    gameOver = false;
    feedback.textContent = '';
    feedback.className = 'feedback';
    guessInput.value = '';
    guessCard.classList.remove('hidden');
    resultCard.classList.add('hidden');
    renderQuestions();
    renderLog();
    updateBadge();
    updateGuessMode();
  }

  newGameBtn.addEventListener('click', newGame);
  playAgainBtn.addEventListener('click', newGame);

  newGame();
</script>
